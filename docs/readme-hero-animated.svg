<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Import Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500;600;700&amp;display=swap');

      /* Custom animations */
      .glow-pulse-orange {
        animation: pulse-orange 4s infinite ease-in-out;
      }
      .glow-pulse-green {
        animation: pulse-green 4s infinite ease-in-out;
      }
      .glow-pulse-red {
        animation: pulse-red 4s infinite ease-in-out;
      }
      @keyframes pulse-orange {
        0%, 100% { stroke-opacity: 0.1; }
        50% { stroke-opacity: 0.25; }
      }
      @keyframes pulse-green {
        0%, 100% { stroke-opacity: 0.1; }
        50% { stroke-opacity: 0.3; }
      }
      @keyframes pulse-red {
        0%, 100% { stroke-opacity: 0.1; }
        50% { stroke-opacity: 0.35; }
      }

      .pulse-dot {
        animation: dot-pulse 3s infinite ease-in-out;
      }
      @keyframes dot-pulse {
        0%, 100% { r: 14; opacity: 0.8; }
        50% { r: 16; opacity: 1; }
      }
    </style>

    <!-- Brand Gradients -->
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9f0a" />
      <stop offset="100%" stop-color="#30d158" />
    </linearGradient>
    <radialGradient id="bgRadial1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9f0a" stop-opacity="0.22" />
      <stop offset="100%" stop-color="transparent" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgRadial2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#30d158" stop-opacity="0.18" />
      <stop offset="100%" stop-color="transparent" stop-opacity="0" />
    </radialGradient>

    <!-- Glow Filters -->
    <filter id="titleGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5" />
    </pattern>

    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0f172a" />

  <!-- Ambient glow blobs -->
  <ellipse cx="128" cy="128" rx="320" ry="240" fill="url(#bgRadial1)">
    <animate attributeName="rx" values="320;360;320" dur="6s" repeatCount="indefinite" />
    <animate attributeName="ry" values="240;280;240" dur="6s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="1024" cy="512" rx="360" ry="280" fill="url(#bgRadial2)">
    <animate attributeName="rx" values="360;400;360" dur="8s" repeatCount="indefinite" />
    <animate attributeName="ry" values="280;320;280" dur="8s" repeatCount="indefinite" />
  </ellipse>

  <!-- Grid overlay -->
  <rect width="1280" height="640" fill="url(#grid)" />

  <!-- Noise overlay -->
  <rect width="1280" height="640" filter="url(#noise)" opacity="0.015" />

  <!-- ═══════════════════════ LEFT SIDE ═══════════════════════ -->

  <!-- Brand Title: LETHE (Standalone Vector Path) -->
  <g filter="url(#titleGlow)">
    <path d="M60 145 L60 90.28 L71.8 90.28 L71.8 133.2 L106 133.2 L106 145 Z M166.54 145 L116 145 L116 90.28 L166.54 90.28 L166.54 102.14 L127.93 102.14 L127.93 111.71 L159.02 111.71 L159.02 123.57 L127.93 123.57 L127.93 133.14 L166.54 133.14 Z M176.54 90.28 L226.54 90.28 L226.54 102.14 L207.44 102.14 L207.44 145 L195.64 145 L195.64 102.14 L176.54 102.14 Z M248.32 145 L236.54 145 L236.54 90.28 L248.32 90.28 L248.32 111.71 L280.62 111.71 L280.62 90.28 L292.4 90.28 L292.4 145 L280.62 145 L280.62 123.57 L248.32 123.57 Z M352.94 145 L302.4 145 L302.4 90.28 L352.94 90.28 L352.94 102.14 L314.33 102.14 L314.33 111.71 L345.42 111.71 L345.42 123.57 L314.33 123.57 L314.33 133.14 L352.94 133.14 Z" fill="url(#heroGrad)">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Subtitle -->
  <text x="64" y="185" font-family="Inter, sans-serif" font-size="17" fill="#8b95a5" font-weight="500">
    Autonomous right-to-erasure agent protecting PII
  </text>
  <text x="64" y="210" font-family="Inter, sans-serif" font-size="17" fill="#8b95a5" font-weight="500">
    via TEE network egress blinding.
  </text>

  <!-- Feature List -->
  <g font-family="JetBrains Mono, monospace" font-size="12.5" fill="#c8d0dc">
    <!-- Feature 1 -->
    <text x="68" y="264" fill="#30d158" font-weight="600">→</text>
    <text x="88" y="264">ECIES Payload Encryption (secp256k1)</text>

    <!-- Feature 2 -->
    <text x="68" y="296" fill="#30d158" font-weight="600">→</text>
    <text x="88" y="296">Groth16 ZK Ownership Verification</text>

    <!-- Feature 3 -->
    <text x="68" y="328" fill="#30d158" font-weight="600">→</text>
    <text x="88" y="328">x402 Micropayments &amp; SLA Collateral Escrow</text>

    <!-- Feature 4 -->
    <text x="68" y="360" fill="#30d158" font-weight="600">→</text>
    <text x="88" y="360">TEE Egress Blind Webhook Substitution</text>

    <!-- Feature 5 -->
    <text x="68" y="392" fill="#ef4444" font-weight="600">→</text>
    <text x="88" y="392" fill="#ef4444">Cryptographic Purge (user-removal) Self-Destruct</text>
  </g>

  <!-- Tech Pills -->
  <g font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">
    <!-- Pill 1: Next.js 16 -->
    <rect x="60" y="540" width="98" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <text x="109" y="559" fill="#8b95a5" text-anchor="middle">Next.js 16</text>

    <!-- Pill 2: Rust WASM -->
    <rect x="168" y="540" width="92" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <text x="214" y="559" fill="#8b95a5" text-anchor="middle">Rust WASM</text>

    <!-- Pill 3: Solidity -->
    <rect x="270" y="540" width="76" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <text x="308" y="559" fill="#8b95a5" text-anchor="middle">Solidity</text>

    <!-- Pill 4: Terminal 3 -->
    <rect x="356" y="540" width="92" height="28" rx="6" fill="rgba(255,159,10,0.06)" stroke="rgba(255,159,10,0.15)" stroke-width="1" />
    <text x="402" y="559" fill="#ff9f0a" text-anchor="middle">Terminal 3</text>
  </g>

  <!-- Hackathon badge -->
  <rect x="60" y="470" width="388" height="50" rx="10" fill="rgba(139,92,246,0.05)" stroke="rgba(139,92,246,0.15)" stroke-width="1" />
  <text x="80" y="500" font-family="JetBrains Mono, monospace" font-size="11" fill="#a78bfa" font-weight="600">DoraHacks T3ADK Launch Edition 2026</text>
  <circle cx="403" cy="495" r="6" fill="rgba(139,92,246,0.15)" stroke="#a78bfa" stroke-width="1">
    <animate attributeName="r" values="5;7;5" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- ═══════════════════════ RIGHT SIDE: FLOW DIAGRAM ═══════════════════════ -->

  <!-- Diagram Panel Background -->
  <rect x="560" y="55" width="670" height="530" rx="20" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <!-- ── Step 1: Client Encrypts ── -->
  <g>
    <rect x="590" y="80" width="610" height="95" rx="12" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.06)" stroke-width="1" class="glow-pulse-orange" />
    <circle cx="618" cy="128" r="15" fill="rgba(255,159,10,0.08)" stroke="#ff9f0a" stroke-width="1.5" class="pulse-dot" />
    <text x="618" y="132" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#ff9f0a" text-anchor="middle">1</text>
    <text x="646" y="118" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#e8edf4" letter-spacing="0.5">CLIENT ENCRYPTS &amp; PROVES</text>
    <text x="646" y="140" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#6b7280">@lethe/sdk runs ECDH + snarkjs locally to seal credentials</text>
  </g>

  <!-- ── Step 2: Blind Routing ── -->
  <g>
    <rect x="590" y="195" width="610" height="95" rx="12" fill="rgba(255,255,255,0.015)" stroke="rgba(255,159,10,0.15)" stroke-width="1" class="glow-pulse-orange" />
    <circle cx="618" cy="243" r="15" fill="rgba(255,159,10,0.08)" stroke="#ff9f0a" stroke-width="1.5" class="pulse-dot" />
    <text x="618" y="247" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#ff9f0a" text-anchor="middle">2</text>
    <text x="646" y="233" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#ff9f0a" letter-spacing="0.5">BLIND ROUTING VIA AGENT</text>
    <text x="646" y="255" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#6b7280">Node coordinator routes envelope without plaintext access</text>
  </g>

  <!-- ── Step 3: TEE Egress ── -->
  <g>
    <rect x="590" y="310" width="610" height="95" rx="12" fill="rgba(255,255,255,0.015)" stroke="rgba(48,209,88,0.15)" stroke-width="1" class="glow-pulse-green" />
    <circle cx="618" cy="358" r="15" fill="rgba(48,209,88,0.08)" stroke="#30d158" stroke-width="1.5" class="pulse-dot" />
    <text x="618" y="362" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#30d158" text-anchor="middle">3</text>
    <text x="646" y="348" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#30d158" letter-spacing="0.5">TEE EGRESS DECRYPTION</text>
    <text x="646" y="370" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#6b7280">WASM contract decrypts inside TEE; replaces placeholders during egress</text>
  </g>

  <!-- ── Step 4: Self-Destruct ── -->
  <g>
    <rect x="590" y="425" width="610" height="95" rx="12" fill="rgba(255,255,255,0.015)" stroke="rgba(239,68,68,0.15)" stroke-width="1" class="glow-pulse-red" />
    <circle cx="618" cy="473" r="15" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="1.5" class="pulse-dot" />
    <text x="618" y="477" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">4</text>
    <text x="646" y="463" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#ef4444" letter-spacing="0.5">IDENTITY PURGE (SEPPUKU)</text>
    <text x="646" y="485" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#6b7280">forget-me scrubs volatile RAM and triggers T3 user-removal</text>
    
    <!-- Dissolving particles from step 4 -->
    <rect x="760" y="500" width="4" height="4" rx="1" fill="#ef4444">
      <animate attributeName="y" values="500;490;510;500" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite" />
    </rect>
    <rect x="820" y="505" width="3" height="3" rx="1" fill="#ef4444">
      <animate attributeName="y" values="505;495;515;505" dur="2.4s" begin="0.3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2.4s" begin="0.3s" repeatCount="indefinite" />
    </rect>
    <rect x="890" y="502" width="3" height="3" rx="1" fill="#ef4444">
      <animate attributeName="y" values="502;492;512;502" dur="1.8s" begin="0.6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" begin="0.6s" repeatCount="indefinite" />
    </rect>
    <rect x="950" y="498" width="4" height="4" rx="1" fill="#ef4444">
      <animate attributeName="y" values="498;488;508;498" dur="2.2s" begin="0.9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2.2s" begin="0.9s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- ── Connecting Flow Lines ── -->
  <!-- Step 1 → 2 -->
  <line x1="618" y1="175" x2="618" y2="195" stroke="rgba(255,159,10,0.2)" stroke-width="1.5" stroke-dasharray="3 3">
    <animate attributeName="stroke-opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite" />
  </line>
  <!-- Step 2 → 3 -->
  <line x1="618" y1="290" x2="618" y2="310" stroke="rgba(48,209,88,0.2)" stroke-width="1.5" stroke-dasharray="3 3">
    <animate attributeName="stroke-opacity" values="0.1;0.4;0.1" dur="3s" begin="1s" repeatCount="indefinite" />
  </line>
  <!-- Step 3 → 4 -->
  <line x1="618" y1="405" x2="618" y2="425" stroke="rgba(239,68,68,0.2)" stroke-width="1.5" stroke-dasharray="3 3">
    <animate attributeName="stroke-opacity" values="0.1;0.4;0.1" dur="3s" begin="2s" repeatCount="indefinite" />
  </line>

  <!-- Decorative Corner Brackets -->
  <path d="M570 65 L570 55 L580 55" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  <path d="M1240 65 L1240 55 L1230 55" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  <path d="M570 575 L570 585 L580 585" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  <path d="M1240 575 L1240 585 L1230 585" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
</svg>
