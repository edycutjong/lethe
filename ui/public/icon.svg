<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Brand Gradient with Dynamic variables and static fallback values -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--primary, #ff9f0a)" />
      <stop offset="100%" stop-color="var(--accent, #30d158)" />
    </linearGradient>

    <!-- Subtler inner gradient for shield backdrop -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.01)" />
    </linearGradient>

    <!-- Dynamic Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Grid Style Dots inside Icon -->
  <g opacity="0.15">
    <circle cx="96" cy="96" r="3" fill="#ffffff" />
    <circle cx="256" cy="96" r="3" fill="#ffffff" />
    <circle cx="416" cy="96" r="3" fill="#ffffff" />
    <circle cx="96" cy="256" r="3" fill="#ffffff" />
    <circle cx="416" cy="256" r="3" fill="#ffffff" />
    <circle cx="96" cy="416" r="3" fill="#ffffff" />
    <circle cx="256" cy="416" r="3" fill="#ffffff" />
    <circle cx="416" cy="416" r="3" fill="#ffffff" />
  </g>

  <!-- Outer Ring with Gradient Stroke -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#brandGrad)" stroke-width="4" opacity="0.3" stroke-dasharray="12 6" />

  <!-- Shield Backdrop -->
  <path d="M256,70 C350,70 410,110 410,190 C410,290 310,395 256,442 C202,395 102,290 102,190 C102,110 162,70 256,70 Z" 
        fill="url(#shieldGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

  <!-- Dissolving / Blinding Right-to-Erasure Wave -->
  <!-- Left Side: Solid Shield Structure -->
  <path d="M256,105 C310,105 350,135 350,190 C350,250 295,330 256,368 L256,105 Z" 
        fill="url(#brandGrad)" filter="url(#glow)" opacity="0.85" />

  <!-- Right Side: Dissolving/Wiping Pixels (Representing Erasure & Blinding) -->
  <g fill="url(#brandGrad)">
    <!-- Horizontal wiping slices -->
    <rect x="264" y="120" width="80" height="6" rx="3" opacity="0.9" />
    <rect x="264" y="140" width="65" height="6" rx="3" opacity="0.8" />
    <rect x="264" y="160" width="75" height="6" rx="3" opacity="0.7" />
    <rect x="264" y="180" width="55" height="6" rx="3" opacity="0.85" />
    
    <rect x="264" y="200" width="85" height="6" rx="3" opacity="0.6" />
    <rect x="264" y="220" width="45" height="6" rx="3" opacity="0.75" />
    <rect x="264" y="240" width="70" height="6" rx="3" opacity="0.5" />
    <rect x="264" y="260" width="35" height="6" rx="3" opacity="0.7" />
    
    <rect x="264" y="280" width="50" height="6" rx="3" opacity="0.4" />
    <rect x="264" y="300" width="25" height="6" rx="3" opacity="0.6" />
    <rect x="264" y="320" width="35" height="6" rx="3" opacity="0.3" />
    <rect x="264" y="340" width="15" height="6" rx="3" opacity="0.5" />

    <!-- Dispersed digital pixels -->
    <rect x="355" y="120" width="6" height="6" rx="1.5" opacity="0.8" />
    <rect x="340" y="140" width="6" height="6" rx="1.5" opacity="0.6" />
    <rect x="350" y="160" width="6" height="6" rx="1.5" opacity="0.5" />
    <rect x="325" y="180" width="6" height="6" rx="1.5" opacity="0.7" />
    <rect x="360" y="200" width="6" height="6" rx="1.5" opacity="0.4" />
    <rect x="320" y="220" width="6" height="6" rx="1.5" opacity="0.6" />
    <rect x="345" y="240" width="6" height="6" rx="1.5" opacity="0.3" />
    <rect x="310" y="260" width="6" height="6" rx="1.5" opacity="0.5" />
    <rect x="325" y="280" width="6" height="6" rx="1.5" opacity="0.2" />
    <rect x="300" y="300" width="6" height="6" rx="1.5" opacity="0.4" />
  </g>
</svg>
